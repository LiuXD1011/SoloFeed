services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solofeed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rsshub:
    image: diygod/rsshub:latest
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: 300

volumes:
  pgdata:
