{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SoloFeed{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/solofeed.css' %}" rel="stylesheet">
</head>
<body>
    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="{% if user.is_authenticated %}pb-tabbar{% endif %}">
        {% block content %}{% endblock %}
    </main>

    {% if user.is_authenticated %}
    <nav class="navbar fixed-bottom bg-white border-top solofeed-tabbar">
        <div class="container-fluid d-flex justify-content-around py-1">
            <a href="{% url 'home' %}" class="tab-item {% block tab_home %}{% endblock %}">
                <i class="bi bi-house-door"></i>
                <span>首页</span>
            </a>
            <a href="{% url 'discover' %}" class="tab-item {% block tab_discover %}{% endblock %}">
                <i class="bi bi-search"></i>
                <span>发现</span>
            </a>
            <a href="{% url 'subscriptions' %}" class="tab-item {% block tab_subs %}{% endblock %}">
                <i class="bi bi-bookmark"></i>
                <span>订阅</span>
            </a>
            <a href="{% url 'profile' %}" class="tab-item {% block tab_profile %}{% endblock %}">
                <i class="bi bi-person"></i>
                <span>我的</span>
            </a>
        </div>
    </nav>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
