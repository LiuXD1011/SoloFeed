{% extends "base.html" %}

{% block title %}登录 - SoloFeed{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-header">
        <h1 class="login-logo">SoloFeed</h1>
        <p class="login-slogan">极简跨端追更，拒绝信息洪灾</p>
    </div>

    <div class="login-card">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" id="login-form">
            {% csrf_token %}
            <input type="hidden" name="action" value="login">

            <div class="mb-3">
                <input type="tel" class="form-control form-control-lg" id="phone" name="phone"
                       placeholder="请输入手机号" maxlength="11"
                       value="{{ phone|default:'' }}" required>
            </div>

            <div class="mb-3">
                <div class="input-group">
                    <input type="text" class="form-control form-control-lg" id="code" name="code"
                           placeholder="请输入验证码" maxlength="6" required>
                    <button type="button" class="btn btn-outline-secondary" id="send-code-btn">获取验证码</button>
                </div>
            </div>

            <button type="submit" class="btn btn-dark btn-lg w-100" id="login-btn">登录</button>
        </form>

        <div class="login-footer text-center mt-3">
            <small class="text-muted">登录即同意《用户协议》和《隐私政策》</small>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    const phoneInput = document.getElementById('phone');
    const codeInput = document.getElementById('code');
    const sendBtn = document.getElementById('send-code-btn');
    const loginBtn = document.getElementById('login-btn');
    const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    let countdown = 0;

    function validatePhone() {
        return /^1[3-9]\d{9}$/.test(phoneInput.value);
    }

    function updateLoginBtn() {
        loginBtn.disabled = !(validatePhone() && codeInput.value.length === 6);
    }

    phoneInput.addEventListener('input', function() {
        sendBtn.disabled = !validatePhone() || countdown > 0;
        updateLoginBtn();
    });

    codeInput.addEventListener('input', updateLoginBtn);

    sendBtn.addEventListener('click', async function() {
        if (!validatePhone()) return;
        sendBtn.disabled = true;

        try {
            const resp = await fetch('/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': csrftoken,
                },
                body: 'action=send_code&phone=' + encodeURIComponent(phoneInput.value),
            });
            const data = await resp.json();
            if (data.success) {
                {% if DEBUG %}
                if (data.code) {
                    codeInput.value = data.code;
                    updateLoginBtn();
                }
                {% endif %}
                countdown = 60;
                const timer = setInterval(function() {
                    countdown--;
                    sendBtn.textContent = countdown + 's';
                    if (countdown <= 0) {
                        clearInterval(timer);
                        sendBtn.textContent = '获取验证码';
                        sendBtn.disabled = !validatePhone();
                    }
                }, 1000);
            }
        } catch (e) {
            sendBtn.disabled = false;
        }
    });

    updateLoginBtn();
})();
</script>
{% endblock %}
